<script>
(function() {
    var STORAGE_KEY = 'pref-theme';
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    var html = document.documentElement;
    if (theme === 'dark') {
        html.classList.add('dark');
        document.body.classList.add('dark');
        html.style.setProperty('--theme', '#1e293b');
        html.style.setProperty('--entry', '#1e293b');
        html.style.setProperty('--primary', 'rgba(255,255,255,0.85)');
        html.style.setProperty('--secondary', 'rgba(255,255,255,0.55)');
        html.style.setProperty('--content', 'rgba(255,255,255,0.9)');
        html.style.setProperty('--border', '#334155');
        html.style.setProperty('--code-bg', '#0f172a');
        html.style.setProperty('--hljs-bg', '#1e293b');
    }
    window.__currentTheme = theme;
})();
</script>

<script>
(function() {
    var themeToggle = document.getElementById('theme-toggle');
    if (!themeToggle || themeToggle.dataset.loaded) return;
    themeToggle.dataset.loaded = 'true';
    var html = document.documentElement;
    var body = document.body;
    var STORAGE_KEY = 'pref-theme';
    var moon = document.getElementById('moon');
    var sun = document.getElementById('sun');
    var darkVars = {'--theme':'#1e293b','--entry':'#1e293b','--primary':'rgba(255,255,255,0.85)','--secondary':'rgba(255,255,255,0.55)','--content':'rgba(255,255,255,0.9)','--border':'#334155','--code-bg':'#0f172a','--hljs-bg':'#1e293b'};
    var lightVars = {'--theme':'#fff','--entry':'#fff','--primary':'#1e293b','--secondary':'#64748b','--content':'#1e293b','--border':'#e2e8f0','--code-bg':'#f1f5f9','--hljs-bg':'#f8fafc'};
    function updateIcons(theme) { if(sun) sun.style.display = theme==='dark'?'block':'none'; if(moon) moon.style.display = theme==='dark'?'none':'block'; }
    function setTheme(theme) { var vars = theme==='dark'?darkVars:lightVars; if(theme==='dark'){html.classList.add('dark');body.classList.add('dark');}else{html.classList.remove('dark');body.classList.remove('dark');} for(var key in vars){html.style.setProperty(key,vars[key]);} localStorage.setItem(STORAGE_KEY,theme); updateIcons(theme); }
    var currentTheme = html.classList.contains('dark')?'dark':'light';
    updateIcons(currentTheme);
    themeToggle.addEventListener('click',function(){ var isDark = html.classList.contains('dark'); setTheme(isDark?'light':'dark'); });
})();
</script>
