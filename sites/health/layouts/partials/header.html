<header class="header">
    <nav class="nav">
        <div class="nav-left">
            {{ if .IsHome }}
            <a class="brand-link" href="/">
                <span class="brand-icon">⌂</span>
                <span class="brand-title">Hyper-Personalized Health</span>
            </a>
            {{ else }}
            <a class="brand-link" href="/health/">
                <span class="brand-icon">⌂</span>
                <span class="brand-title">Hyper-Personalized Health</span>
            </a>
            {{ end }}
        </div>
        
        <div class="nav-right">
            {{- if (not .Site.Params.disableThemeToggle) }}
            <button id="theme-toggle" accesskey="t" title="Toggle theme">
                <span id="theme-icon-sun" class="theme-icon">☀️</span>
                <span id="theme-icon-moon" class="theme-icon">🌙</span>
            </button>
            {{- end }}
        </div>
    </nav>
</header>
