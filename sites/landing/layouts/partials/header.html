<header class="header">
    <div class="header-inner">
        <nav class="nav">
            <div class="nav-left">
                <a class="brand-link" href="/">
                    <span class="brand-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
                        </svg>
                    </span>
                    <span class="brand-title">Blog and Beyond</span>
                </a>
            </div>
            <div class="nav-right">
                <button id="theme-toggle" accesskey="t" title="Toggle theme (Alt + T)">
                    <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </nav>
    </div>
</header>

<script>
(function() {
    const themeToggle = document.getElementById('theme-toggle');
    if (!themeToggle) return;
    
    const html = document.documentElement;
    const body = document.body;
    const STORAGE_KEY = 'pref-theme';
    
    function getTheme() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored === 'dark' || stored === 'light') return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    
    function setTheme(theme) {
        if (theme === 'dark') {
            html.classList.add('dark');
            body.classList.add('dark');
        } else {
            html.classList.remove('dark');
            body.classList.remove('dark');
        }
        
        localStorage.setItem(STORAGE_KEY, theme);
        
        const sun = document.getElementById('sun');
        const moon = document.getElementById('moon');
        if (sun) sun.style.display = theme === 'dark' ? 'block' : 'none';
        if (moon) moon.style.display = theme === 'dark' ? 'none' : 'block';
        
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = theme === 'dark' ? '#1e293b' : '#ffffff';
    }
    
    const moonIcon = document.getElementById('moon');
    if (moonIcon && !document.getElementById('sun')) {
        const sunSVG = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        sunSVG.setAttribute('id', 'sun');
        sunSVG.setAttribute('width', '18');
        sunSVG.setAttribute('height', '18');
        sunSVG.setAttribute('viewBox', '0 0 24 24');
        sunSVG.setAttribute('fill', 'none');
        sunSVG.setAttribute('stroke', 'currentColor');
        sunSVG.setAttribute('stroke-width', '2');
        sunSVG.setAttribute('stroke-linecap', 'round');
        sunSVG.setAttribute('stroke-linejoin', 'round');
        sunSVG.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        sunSVG.style.display = 'none';
        themeToggle.appendChild(sunSVG);
    }
    
    setTheme(getTheme());
    
    themeToggle.addEventListener('click', function() {
        const isDark = html.classList.contains('dark');
        setTheme(isDark ? 'light' : 'dark');
    });
    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem(STORAGE_KEY)) {
            setTheme(e.matches ? 'dark' : 'light');
        }
    });
})();
</script>
