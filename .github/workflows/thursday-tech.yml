name: Thursday - Ultra-Compact Tech

on:
  schedule:
    - cron: '0 1 * * 4'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency: tech-pulse

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Setup Hugo
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
        
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Generate Post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL_TECH }}
          SITE_DIR: sites/tech
          TOPIC_DAY: 1
        run: node shared/site-poster.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./sites/tech/public
          publish_branch: gh-pages-tech
          cname: tech.blogandbeyond.com