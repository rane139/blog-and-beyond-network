name: Sunday - Health Post

on:
  schedule:
    - cron: '0 1 * * 0'  # Sunday 7 AM UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency: health-post

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Setup Hugo Modules
        shell: bash
        env:
          SITE_DIR: sites/health
        run: |
          cd $SITE_DIR
          hugo mod tidy
        
      - name: Install Dependencies
        run: npm ci

      - name: Debug Environment
        run: |
          echo "=== Node Version ==="
          node --version
          
          echo "=== Working Directory ==="
          pwd
          ls -la
          
          echo "=== Shared Directory ==="
          ls -la shared/
          
          echo "=== Site Directory ==="
          ls -la $SITE_DIR/
          
          echo "=== Secrets Check ==="
          if [ -z "$DEEPSEEK_KEY" ]; then echo "❌ DEEPSEEK_API_KEY is empty"; else echo "✅ DEEPSEEK_API_KEY is set"; fi
          if [ -z "$REPLICATE_KEY" ]; then echo "❌ REPLICATE_API_TOKEN is empty"; else echo "✅ REPLICATE_API_TOKEN is set"; fi
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_KEY: ${{ secrets.REPLICATE_API_TOKEN }}
          SITE_DIR: sites/health
      
      - name: Generate Post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL_HEALTH }}
          SITE_DIR: sites/health
          TOPIC_DAY: 0

        run: |
          set -e
          echo "Starting post generation..."
          node shared/site-poster.js
          echo "Done."
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./sites/health/public
          publish_branch: gh-pages-health
          cname: health.blogandbeyond.com