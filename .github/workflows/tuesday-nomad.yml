name: Tuesday - Micro-Nomad

on:
  schedule:
    - cron: '0 1 * * 2'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency: nomad-post

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Install Dependencies
        run: npm ci
      
      - name: Generate Post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL_NOMAD }}
          SITE_DIR: sites/nomad
          TOPIC_DAY: 2
        run: node shared/site-poster.js

      - name: Commit New Post to Main
        shell: bash
        run: |
          git config user.name "blog-automation-bot"
          git config user.email "bot@blogandbeyond.local"
          git add sites/nomad/content/
          git add sites/nomad/static/images/
          git diff --staged --quiet || git commit -m "📝 Nomad: New post - $(date +%Y-%m-%d)"
          git push origin master

      - name: Build Hugo Site
        shell: bash
        run: |
          cd sites/nomad
          hugo --minify
    
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./sites/nomad/public
          destination_dir: nomad
          publish_branch: gh-pages
          keep_files: true
    # Deploy to gh-pages-nomad, cname: nomad.blogandbeyond.com
# Force schedule registration Mon  8 Jun 2026 20:50:30 PST
