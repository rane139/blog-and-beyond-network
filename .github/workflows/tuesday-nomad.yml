name: Tuesday - Micro-Nomad

on:
  schedule:
    - cron: '0 1 * * 2'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency: nomad-pulse

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Setup Hugo Modules
        shell: bash
        env:
          SITE_DIR: sites/health
        run: |
          cd $SITE_DIR
          hugo mod tidy
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Generate Post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL_NOMAD }}
          SITE_DIR: sites/nomad
          TOPIC_DAY: 2
        run: node shared/site-poster.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./sites/nomad/public
          publish_branch: gh-pages-nomad
          cname: nomad.blogandbeyond.com
    # Deploy to gh-pages-nomad, cname: nomad.blogandbeyond.com