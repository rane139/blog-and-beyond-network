name: Monday - Digital Detox

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency: detox-post

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true
    
      - name: Install Dependencies
        run: npm ci

      - name: Debug Environment
        run: |
          echo "=== Node Version ==="
          node --version
          
          echo "=== Working Directory ==="
          pwd
          ls -la
          
          echo "=== Shared Directory ==="
          ls -la shared/
          
          echo "=== Site Directory ==="
          ls -la $SITE_DIR/
          
          echo "=== Secrets Check ==="
          if [ -z "$DEEPSEEK_KEY" ]; then echo "❌ DEEPSEEK_API_KEY is empty"; else echo "✅ DEEPSEEK_API_KEY is set"; fi
          if [ -z "$REPLICATE_KEY" ]; then echo "❌ REPLICATE_API_TOKEN is empty"; else echo "✅ REPLICATE_API_TOKEN is set"; fi
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_KEY: ${{ secrets.REPLICATE_API_TOKEN }}
          SITE_DIR: sites/detox
      
      - name: Generate Post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL_DETOX }}
          SITE_DIR: sites/detox
          TOPIC_DAY: 1
        run: |
          set -e
          echo "Starting post generation..."
          node shared/site-poster.js
          echo "Done."

      - name: Commit New Post to Main
        shell: bash
        run: |
          git config user.name "blog-automation-bot"
          git config user.email "bot@blogandbeyond.local"
          git add sites/detox/content/
          git add sites/detox/static/images/
          git diff --staged --quiet || git commit -m "📝 Detox: New post - $(date +%Y-%m-%d)"
          git push origin master

      - name: Build Hugo Site
        shell: bash
        run: |
          cd sites/detox
          hugo --minify    
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./sites/detox/public
          destination_dir: detox
          publish_branch: gh-pages
          keep_files: true